<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добросервис.Жизнь калькулятор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState } = React;

        // Жесткая себестоимость консультации
        const CONSULT_COST = 750;

        // Конфигурация тарифов: обновлены лимиты и скидки
        const TARIFFS = {
            annual: {
                base: { 
                    name: 'Базовый ИИ', price: 1200, fixed: 200, consults: 0, consultDiscount: 20,
                    features: ['Доступ к платформе 24/7', 'Скидка 20% на покупку живых звонков']
                },
                unlimited: { 
                    name: 'ИИ Безлимит', price: 3300, fixed: 600, consults: 1, consultDiscount: 20,
                    features: ['Доступ к платформе 24/7', '1 устная консультация со специалистом (врач/юрист/психолог/ЗОЖ)', 'Скидка 20% на услуги сверх лимита']
                },
                premium: { 
                    name: 'Премиум', price: 4990, fixed: 600, consults: 3, consultDiscount: 20,
                    features: ['Доступ к платформе 24/7', '3 устные консультации со специалистом (врач/юрист/психолог/ЗОЖ)', 'Скидка 20% на услуги сверх лимита']
                }
            },
            monthly: {
                base: { 
                    name: 'Базовый ИИ (Мес)', price: 150, fixed: 25, consults: 0, consultDiscount: 0,
                    features: ['Доступ к платформе 24/7', 'Живые звонки приобретаются отдельно (без скидки)']
                },
                unlimited: { 
                    name: 'ИИ Безлимит (Мес)', price: 390, fixed: 50, consults: 0, consultDiscount: 0,
                    features: ['Доступ к платформе 24/7', 'Живые звонки приобретаются отдельно (без скидки)']
                },
                premium: { 
                    name: 'Премиум (Мес)', price: 590, fixed: 50, consults: 0, consultDiscount: 0,
                    features: ['Доступ к платформе 24/7', 'Живые звонки приобретаются отдельно (без скидки)']
                }
            }
        };

        function App() {
            const [view, setView] = useState('retail');
            const [billing, setBilling] = useState('annual');
            
            const [selected, setSelected] = useState({ base: true, unlimited: true, premium: true });
            const [users, setUsers] = useState({ base: 100, unlimited: 10, premium: 5 });
            const [utils, setUtils] = useState({ base: 10, unlimited: 10, premium: 10 });

            const activeTariffs = TARIFFS[billing];

            const handleUserChange = (key, value) => {
                setUsers({ ...users, [key]: Number(value) });
            };

            const handleUtilChange = (key, value) => {
                setUtils({ ...utils, [key]: Number(value) });
            };

            let grandRetailRevenue = 0;
            let grandRetailCost = 0;
            let grandB2BTotal = 0;

            return (
                <div className="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h1 className="text-3xl font-bold text-slate-800 mb-8">Добросервис.Жизнь калькулятор</h1>
                    
                    {/* Навигация */}
                    <div className="flex flex-wrap gap-3 mb-8 border-b pb-6">
                        <button onClick={() => setView('retail')} className={`px-5 py-2 rounded-lg font-medium transition ${view === 'retail' ? 'bg-blue-600 text-white shadow' : 'bg-slate-100 text-slate-600'}`}>Розница</button>
                        <button onClick={() => setView('b2b')} className={`px-5 py-2 rounded-lg font-medium transition ${view === 'b2b' ? 'bg-blue-600 text-white shadow' : 'bg-slate-100 text-slate-600'}`}>B2B Партнер</button>
                        <button onClick={() => setView('info')} className={`px-5 py-2 rounded-lg font-medium transition ${view === 'info' ? 'bg-blue-600 text-white shadow' : 'bg-slate-100 text-slate-600'}`}>Тарифные планы</button>
                        
                        <div className="ml-auto flex bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setBilling('annual')} className={`px-4 py-1 rounded-md transition ${billing === 'annual' ? 'bg-white shadow text-blue-700 font-bold' : 'text-slate-600'}`}>Год</button>
                            <button onClick={() => setBilling('monthly')} className={`px-4 py-1 rounded-md transition ${billing === 'monthly' ? 'bg-white shadow text-blue-700 font-bold' : 'text-slate-600'}`}>Месяц</button>
                        </div>
                    </div>

                    {/* Раздел: Розница */}
                    {view === 'retail' && (
                        <div>
                            {Object.entries(activeTariffs).map(([k, t]) => {
                                const tariffUsers = users[k] || 0;
                                const tariffUtil = utils[k] || 0;
                                
                                // СЕБЕСТОИМОСТЬ: Утилизация влияет на консультации, фиксированные затраты убраны
                                const consultsCost = t.consults * CONSULT_COST * (tariffUtil / 100);
                                const totalCostPerUnit = consultsCost;
                                
                                const projectPrice = tariffUsers * t.price;
                                const totalCostProject = tariffUsers * totalCostPerUnit;
                                const margin = projectPrice - totalCostProject;
                                
                                if (selected[k]) {
                                    grandRetailRevenue += projectPrice;
                                    grandRetailCost += totalCostProject;
                                }
                                
                                return (
                                    <div key={k} className={`border rounded-xl p-6 mb-4 transition ${selected[k] ? 'border-blue-500 bg-blue-50/30' : 'border-slate-200'}`}>
                                        <div className="flex items-center justify-between mb-4">
                                            <label className="flex items-center gap-3 font-bold text-xl cursor-pointer">
                                                <input type="checkbox" className="w-5 h-5" checked={selected[k]} onChange={() => setSelected({...selected, [k]: !selected[k]})}/> 
                                                {t.name} — <span className="text-blue-600">{t.price} ₽</span>
                                            </label>
                                        </div>

                                        {selected[k] && (
                                            <div className="bg-white p-5 rounded-lg shadow-inner border border-slate-100">
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Количество лицензий</label>
                                                        <input type="number" value={tariffUsers} onChange={e => handleUserChange(k, e.target.value)} className="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500"/>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Утилизация (%)</label>
                                                        <input type="number" value={tariffUtil} onChange={e => handleUtilChange(k, e.target.value)} className="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500"/>
                                                    </div>
                                                </div>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm mb-4">
                                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                        <div className="text-slate-500 text-xs uppercase mb-1">Выручка (по тарифу)</div>
                                                        <div className="font-bold text-xl">{projectPrice.toLocaleString()} ₽</div>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                        <div className="text-slate-500 text-xs uppercase mb-1">Себестоимость</div>
                                                        <div className="font-bold text-xl">{totalCostProject.toLocaleString()} ₽</div>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                        <div className="text-slate-500 text-xs uppercase mb-1">Маржа</div>
                                                        <div className={`font-bold text-xl ${margin >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>{margin.toLocaleString()} ₽</div>
                                                    </div>
                                                </div>
                                                
                                                <div className="text-sm text-slate-600 border-t pt-4 space-y-2">
                                                    <p className="font-bold text-slate-800">Расшифровка себестоимости на 1 лицензию ({totalCostPerUnit.toLocaleString()} ₽):</p>
                                                    <ul className="list-disc list-inside space-y-2 ml-2">
                                                        <li>
                                                            Консультации: <b>{consultsCost.toLocaleString()} ₽</b> 
                                                            <span className="text-slate-400 italic ml-1">({t.consults} шт. × {CONSULT_COST} ₽ × {tariffUtil}%)</span>
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}

                            <div className="mt-8 bg-slate-800 text-white p-6 rounded-xl shadow-lg">
                                <h2 className="text-xl font-bold mb-4 uppercase text-slate-300">Сумма Итого (Розница)</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div>
                                        <div className="text-slate-400 text-sm mb-1">Общая выручка:</div>
                                        <div className="text-3xl font-bold">{grandRetailRevenue.toLocaleString()} ₽</div>
                                    </div>
                                    <div>
                                        <div className="text-slate-400 text-sm mb-1">Общая себестоимость:</div>
                                        <div className="text-3xl font-bold">{grandRetailCost.toLocaleString()} ₽</div>
                                    </div>
                                    <div>
                                        <div className="text-slate-400 text-sm mb-1">Итоговая маржа:</div>
                                        <div className={`text-3xl font-bold ${grandRetailRevenue - grandRetailCost >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                            {(grandRetailRevenue - grandRetailCost).toLocaleString()} ₽
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Раздел: B2B */}
                    {view === 'b2b' && (
                        <div>
                            {Object.entries(activeTariffs).map(([k, t]) => {
                                const tariffUsers = users[k] || 0;
                                const tariffUtil = utils[k] || 0;
                                
                                const partnerPrice = t.price * (tariffUtil / 100);
                                const totalPartnerPrice = partnerPrice * tariffUsers;

                                if (selected[k]) {
                                    grandB2BTotal += totalPartnerPrice;
                                }
                                
                                return (
                                    <div key={k} className={`border rounded-xl p-6 mb-4 transition ${selected[k] ? 'border-blue-500 bg-blue-50/30' : 'border-slate-200'}`}>
                                        <div className="flex items-center justify-between mb-4">
                                            <label className="flex items-center gap-3 font-bold text-xl cursor-pointer">
                                                <input type="checkbox" className="w-5 h-5" checked={selected[k]} onChange={() => setSelected({...selected, [k]: !selected[k]})}/> 
                                                {t.name} — <span className="text-slate-500 text-base font-normal">Розница: {t.price} ₽</span>
                                            </label>
                                        </div>

                                        {selected[k] && (
                                            <div className="bg-white p-5 rounded-lg shadow-inner border border-slate-100 flex flex-col md:flex-row gap-6 justify-between items-center">
                                                <div className="flex gap-4 w-full md:w-1/2">
                                                    <div className="flex-1">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Лицензии</label>
                                                        <input type="number" value={tariffUsers} onChange={e => handleUserChange(k, e.target.value)} className="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500"/>
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Утилизация (%)</label>
                                                        <input type="number" value={tariffUtil} onChange={e => handleUtilChange(k, e.target.value)} className="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500"/>
                                                    </div>
                                                </div>

                                                <div className="text-right w-full md:w-1/2">
                                                    <div className="text-emerald-600 font-bold text-3xl">
                                                        {partnerPrice.toLocaleString()} ₽ <span className="text-sm text-slate-500 font-normal">/ 1 шт.</span>
                                                    </div>
                                                    <div className="text-xs font-bold text-slate-500 uppercase mt-1">
                                                        Итого по тарифу: {totalPartnerPrice.toLocaleString()} ₽
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}

                            <div className="mt-8 bg-slate-800 text-white p-6 rounded-xl shadow-lg">
                                <h2 className="text-xl font-bold mb-2 uppercase text-slate-300">Сумма Итого (B2B Контракт)</h2>
                                <p className="text-slate-400 text-sm mb-4">Общая стоимость контракта для партнера с учетом индивидуальной утилизации тарифов</p>
                                <div className="text-4xl font-bold text-emerald-400">{grandB2BTotal.toLocaleString()} ₽</div>
                            </div>
                        </div>
                    )}

                    {/* Раздел: Информация о тарифах */}
                    {view === 'info' && (
                        <div className="grid grid-cols-1 gap-6">
                            {Object.entries(activeTariffs).map(([k, t]) => (
                                <div key={k} className="p-6 bg-white rounded-xl border border-slate-200 shadow-sm">
                                    <div className="flex justify-between items-center border-b pb-4 mb-4">
                                        <h3 className="font-bold text-blue-800 text-2xl">{t.name}</h3>
                                        <div className="text-right">
                                            <div className="text-2xl font-bold text-slate-800">{t.price} ₽</div>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Наполнение тарифа:</h4>
                                        <ul className="space-y-3">
                                            {t.features.map((feature, idx) => (
                                                <li key={idx} className="flex items-start gap-3">
                                                    <span className="text-emerald-500 mt-0.5">✓</span>
                                                    <span className="text-slate-700 leading-snug">{feature}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
