<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dobroservice</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    
    <h1 id="title" style="color: red; font-size: 24px;">Идет загрузка...</h1>
