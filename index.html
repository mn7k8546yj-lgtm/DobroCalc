<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dobroservice Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-blue-800 mb-6">Калькулятор Dobroservice</h1>
        
        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-600 mb-1">Количество лицензий</label>
            <input type="number" id="users" value="1000" class="w-full p-3 border rounded-lg mb-4">
            <button onclick="calculate()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Рассчитать</button>
        </div>

        <table class="w-full text-sm hidden" id="resultTable">
            <thead><tr class="text-left text-gray-400 border-b"><th>Тариф</th><th>Маржа</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        function calculate() {
            const users = parseInt(document.getElementById('users').value);
            const table = document.getElementById('resultTable');
            const tbody = document.getElementById('tableBody');
            
            const tariffs = [
                { name: 'Базовый', price: 120, cost: 80 },
                { name: 'Безлимит', price: 300, cost: 200 },
                { name: 'Премиум', price: 500, cost: 350 }
            ];

            tbody.innerHTML = '';
            tariffs.forEach(t => {
                const margin = (t.price - t.cost) * users;
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-3 font-bold">${t.name}</td>
                        <td class="py-3 text-green-600 font-bold">${margin.toLocaleString()} ₽</td>
                    </tr>`;
            });

            table.classList.remove('hidden');
        }
    </script>
</body>
</html>
