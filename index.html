<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Экономика Dobroservice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState } = React;

        const TARIFFS = {
            annual: {
                base: { name: 'Базовый ИИ', price: 1200, fixed: 200, queries: 1000, consults: 0 },
                unlimited: { name: 'ИИ Безлимит', price: 3300, fixed: 600, queries: 5000, consults: 0 },
                premium: { name: 'Премиум', price: 4990, fixed: 600, queries: 10000, consults: 3 }
            },
            monthly: {
                base: { name: 'Базовый ИИ (Мес)', price: 150, fixed: 25, queries: 100, consults: 0 },
                unlimited: { name: 'ИИ Безлимит (Мес)', price: 390, fixed: 50, queries: 500, consults: 0 },
                premium: { name: 'Премиум (Мес)', price: 590, fixed: 50, queries: 1000, consults: 0 }
            }
        };

        function App() {
            const [view, setView] = useState('retail'); // retail, b2b, info
            const [billing, setBilling] = useState('annual');
            const [users, setUsers] = useState(100);
            const [util, setUtil] = useState(30);
            const [selected, setSelected] = useState({ base: true, unlimited: false, premium: false });

            const activeTariffs = TARIFFS[billing];

            return (
                <div className="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
                    <h1 className="text-2xl font-bold mb-6">Экономика Dobroservice</h1>
                    
                    <div className="flex gap-2 mb-6 border-b pb-4">
                        <button onClick={() => setView('retail')} className={`px-4 py-2 rounded ${view === 'retail' ? 'bg-blue-600 text-white' : 'bg-slate-200'}`}>Розница</button>
                        <button onClick={() => setView('b2b')} className={`px-4 py-2 rounded ${view === 'b2b' ? 'bg-blue-600 text-white' : 'bg-slate-200'}`}>B2B Партнер</button>
                        <button onClick={() => setView('info')} className={`px-4 py-2 rounded ${view === 'info' ? 'bg-blue-600 text-white' : 'bg-slate-200'}`}>Тарифные планы</button>
                    </div>

                    {view !== 'info' && (
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div><label className="block text-xs font-bold">Лицензии</label><input type="number" value={users} onChange={e => setUsers(Number(e.target.value))} className="w-full p-2 border rounded"/></div>
                            <div><label className="block text-xs font-bold">Утилизация (%)</label><input type="number" value={util} onChange={e => setUtil(Number(e.target.value))} className="w-full p-2 border rounded"/></div>
                        </div>
                    )}

                    {view === 'retail' && Object.entries(activeTariffs).map(([k, t]) => (
                        <div key={k} className="border p-4 rounded mb-2">
                            <label className="flex items-center gap-2 font-bold"><input type="checkbox" checked={selected[k]} onChange={() => setSelected({...selected, [k]: !selected[k]})}/> {t.name} ({t.price} ₽)</label>
                            {selected[k] && (
                                <div className="text-sm mt-2 text-slate-600">
                                    Себестоимость: {((t.queries * (util/100) * 5) + (t.consults * 750)).toLocaleString()} ₽
                                </div>
                            )}
                        </div>
                    ))}

                    {view === 'b2b' && Object.entries(activeTariffs).map(([k, t]) => (
                        <div key={k} className="p-4 border-b">
                            <div className="font-bold">{t.name}</div>
                            <div className="text-emerald-600 font-bold">Партнерская цена: {(t.price * (1 - util/100)).toFixed(0)} ₽</div>
                        </div>
                    ))}

                    {view === 'info' && Object.entries(TARIFFS.annual).map(([k, t]) => (
                        <div key={k} className="mb-4 p-4 bg-slate-50 rounded">
                            <h3 className="font-bold text-blue-700">{t.name}</h3>
                            <p className="text-sm">Цена: {t.price} ₽ | Запросы: {t.queries} | Консультации: {t.consults}</p>
                        </div>
                    ))}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
